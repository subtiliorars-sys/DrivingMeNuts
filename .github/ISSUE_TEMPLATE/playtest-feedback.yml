name: Playtest session feedback
description: Bug reports and session notes from a playtest (private issue)
title: "[Playtest feedback] "
labels:
  - playtest
  - playtest-feedback
body:
  - type: markdown
    attributes:
      value: |
        Use after a play session — or submit from the in-game **FEEDBACK** button (pre-fills this form).
        See [PLAYTEST.md](https://github.com/subtiliorars-sys/DrivingMeNuts---Preview/blob/main/PLAYTEST.md).

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Bug
        - Confusing / not fun
        - I broke it on purpose
        - Praise / worked great
    validations:
      required: true

  - type: input
    id: build
    attributes:
      label: Build / commit (if known)
      placeholder: git sha or v0.1.0 from title screen
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Browser + OS
      placeholder: Chrome 125 / Windows 11
    validations:
      required: true

  - type: textarea
    id: blockers
    attributes:
      label: Blockers
      placeholder: Cannot proceed because...
    validations:
      required: false

  - type: textarea
    id: confusing
    attributes:
      label: Confusing / not fun
    validations:
      required: false

  - type: textarea
    id: wrong_lesson
    attributes:
      label: Felt wrong about business / math
    validations:
      required: false

  - type: textarea
    id: bugs
    attributes:
      label: Bugs (numbered repro steps)
    validations:
      required: false

  - type: textarea
    id: other
    attributes:
      label: Other notes
    validations:
      required: false
